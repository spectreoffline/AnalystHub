<!DOCTYPE html>
<html>
<head>
    <title>SecOps Deep Regex Grouper</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 2rem auto; background: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin: 15px 0; }
        button { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-copy { background: #34a853; color: white; }
        #output { background: #1e1e1e; color: #9cdcfe; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; border: 1px solid #333; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Deep Regex Compressor</h2>
        <p>Groups IPs by common segments and formats for Google SecOps.</p>
        <textarea id="input" placeholder="Paste IP list here..."></textarea>
        
        <div class="controls">
            <button class="btn-primary" onclick="process()">Generate & Escape</button>
            <button class="btn-copy" id="copyBtn" onclick="copyResult()">Copy Result</button>
        </div>

        <div id="output">Result will appear here...</div>
    </div>

    <script>
        function process() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            const lines = [...new Set(input.split(/\s+/).filter(s => s.length > 0))];
            const v4 = lines.filter(ip => ip.includes('.'));
            const v6 = lines.filter(ip => ip.includes(':'));

            let regexGroups = [];
            if (v4.length) regexGroups.push(...buildDeepTrie(v4, '.'));
            if (v6.length) regexGroups.push(...buildDeepTrie(v6, ':'));

            // Format: Escape dots, wrap in / / and join with OR
            const formatted = regexGroups.map(pattern => {
                const escaped = pattern.replace(/\./g, '\\.');
                return `/${escaped}/`;
            }).join(' OR ');

            document.getElementById('output').innerText = formatted;
        }

        function buildDeepTrie(ips, sep) {
            const trie = {};
            for (const ip of ips) {
                let curr = trie;
                ip.split(sep).forEach(part => {
                    if (!curr[part]) curr[part] = {};
                    curr = curr[part];
                });
                curr.$ = true;
            }

            const results = [];
            
            function walk(node, path) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) {
                    results.push(path.join(sep));
                    return;
                }
                if (keys.length === 1) {
                    walk(node[keys[0]], [...path, keys[0]]);
                } else {
                    const branches = keys.map(k => getFullSuffix(node[k], k, sep));
                    results.push(path.join(sep) + sep + "(" + branches.join('|') + ")");
                }
            }

            function getFullSuffix(node, currentPart, sep) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) return currentPart;
                if (keys.length === 1) {
                    return getFullSuffix(node[keys[0]], currentPart + sep + keys[0], sep);
                }
                return currentPart + sep + "(" + keys.map(k => getFullSuffix(node[k], k, sep)).join('|') + ")";
            }

            Object.keys(trie).forEach(k => walk(trie[k], [k]));
            return results;
        }

        async function copyResult() {
            const text = document.getElementById('output').innerText;
            await navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Result", 2000);
        }
    </script>
</body>
</html>
