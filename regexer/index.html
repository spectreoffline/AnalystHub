<!DOCTYPE html>
<html>
<head>
    <title>SecOps UDM Regex Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; line-height: 1.5; background: #f9f9f9; }
        textarea { width: 100%; height: 200px; font-family: monospace; padding: 10px; border: 1px solid #ccc; }
        #output { background: #fff; padding: 15px; border: 1px solid #4285f4; border-left: 5px solid #4285f4; word-break: break-all; margin-top: 10px; font-family: monospace; }
        button { background: #4285f4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .hint { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Google SecOps Regex Compressor</h2>
    <div class="hint">Paste IPs (IPv4 or IPv6). Groups by segments to avoid broken matches.</div>
    <textarea id="input" placeholder="1.212.225.99&#10;101.251.197.46"></textarea>
    <p><button onclick="generate()">Generate UDM Regex</button></p>
    <div id="output">Regex will appear here...</div>

    <script>
        function generate() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            const lines = input.split(/\n+/).map(s => s.trim());
            
            // Separate IPv4 and IPv6 to avoid trie corruption
            const v4 = lines.filter(ip => ip.includes('.'));
            const v6 = lines.filter(ip => ip.includes(':'));

            let patterns = [];
            if (v4.length) patterns.push(compress(v4, '.'));
            if (v6.length) patterns.push(compress(v6, ':'));

            const finalRegex = patterns.length > 1 ? `(?:${patterns.join('|')})` : patterns[0];
            // Adding word boundaries \b for UDM accuracy
            document.getElementById('output').innerText = ` /\\b${finalRegex}\\b/`;
        }

        function compress(list, separator) {
            const tokenized = list.map(ip => ip.split(separator));
            const trie = {};

            for (const tokens of tokenized) {
                let current = trie;
                for (const token of tokens) {
                    if (!current[token]) current[current.length] = {}; // marker for order
                    if (!current[token]) current[token] = {};
                    current = current[token];
                }
                current['$'] = {}; // End marker
            }

            function build(node) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) return "";
                
                const parts = keys.map(k => {
                    const escapedK = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const child = build(node[k]);
                    return escapedK + (child ? (separator === '.' ? '\\.' : ':') + child : "");
                });

                return parts.length > 1 ? `(?:${parts.join('|')})` : parts[0];
            }

            return build(trie);
        }
    </script>
</body>
</html>
