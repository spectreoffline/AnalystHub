<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Regex Optimizer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; color: #333; line-height: 1.6; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; box-sizing: border-box; transition: border-color 0.3s; }
        textarea:focus { border-color: #007bff; outline: none; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: opacity 0.2s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        button:hover { opacity: 0.8; }
        #output-container { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; border-radius: 8px; position: relative; }
        #output { font-family: monospace; word-break: break-all; white-space: pre-wrap; font-size: 14px; color: #d63384; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <h2>SIEM Regex Compressor</h2>
    <p>Paste your IP list below. This tool groups common prefixes to keep your queries short.</p>

    <label class="label">Input IPs:</label>
    <textarea id="input" placeholder="192.168.1.1&#10;192.168.1.2&#10;169.100.1.1"></textarea>

    <div class="controls">
        <button class="btn-primary" onclick="process()">Generate Regex</button>
        <button class="btn-secondary" onclick="copyToClipboard()">Copy Result</button>
    </div>

    <label class="label">Optimized Regex:</label>
    <div id="output-container">
        <div id="output">Result will appear here...</div>
    </div>

    <script>
        function trieToRegex(trie) {
            const keys = Object.keys(trie);
            if (keys.length === 0) return '';
            
            // If this node is the end of a string
            const isEnd = keys.includes('');
            const subKeys = keys.filter(k => k !== '');

            if (subKeys.length === 0) return '';

            const result = subKeys.map(k => {
                const escapedK = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return escapedK + trieToRegex(trie[k]);
            });

            if (result.length === 1) {
                return result[0] + (isEnd ? '?' : '');
            } else {
                return '(?:' + result.join('|') + ')' + (isEnd ? '?' : '');
            }
        }

        function process() {
            const text = document.getElementById('input').value;
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
            if (lines.length === 0) return;

            // Build Trie
            const trie = {};
            for (const line of lines) {
                let current = trie;
                // We split by characters but keep the logic for IPs
                for (const char of line) {
                    if (!current[char]) current[char] = {};
                    current = current[char];
                }
                current[''] = {}; // Mark end of string
            }

            const regex = trieToRegex(trie);
            document.getElementById('output').innerText = '/' + regex + '/';
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
