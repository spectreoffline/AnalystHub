<!DOCTYPE html>
<html>
<head>
    <title>SecOps Deep Regex Compressor</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 950px; margin: 2rem auto; background: #f0f2f5; padding: 20px; color: #1c1e21; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { margin-top: 0; color: #1a73e8; }
        textarea { width: 100%; height: 220px; font-family: 'Fira Code', monospace; padding: 15px; border: 2px solid #dee2e6; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; transition: border-color 0.2s; }
        textarea:focus { border-color: #1a73e8; }
        .controls { display: flex; gap: 12px; margin: 20px 0; }
        button { padding: 12px 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .btn-generate { background: #1a73e8; color: white; }
        .btn-generate:hover { background: #1557b0; transform: translateY(-1px); }
        .btn-copy { background: #34a853; color: white; }
        .btn-copy:hover { background: #2d8e47; }
        #output { background: #1e1e1e; color: #9cdcfe; padding: 25px; border-radius: 8px; white-space: pre-wrap; font-family: 'Fira Code', monospace; border: 1px solid #333; word-break: break-all; font-size: 13px; line-height: 1.6; max-height: 400px; overflow-y: auto; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; color: #4b4f56; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SecOps Deep Regex Compressor</h2>
        <p>Tokenizes IPv4/IPv6 by segments to produce the cleanest possible regex for UDM searches.</p>
        
        <label class="label">IP Address List:</label>
        <textarea id="input" placeholder="173.239.218.108&#10;173.239.218.173&#10;2605:6400:8045:447:23e1..."></textarea>
        
        <div class="controls">
            <button class="btn-generate" onclick="run()">Generate SecOps Regex</button>
            <button class="btn-copy" id="copyBtn" onclick="copyResult()">Copy Result</button>
        </div>

        <label class="label">Final Regex (UDM Search Ready):</label>
        <div id="output">Result will appear here...</div>
    </div>

    <script>
        function run() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            // Filter and de-duplicate
            const ips = [...new Set(input.split(/\s+/).filter(s => s.length > 0))];
            
            const v4 = ips.filter(ip => ip.includes('.'));
            const v6 = ips.filter(ip => ip.includes(':'));

            let patterns = [];
            if (v4.length) patterns.push(compress(v4, '.'));
            if (v6.length) patterns.push(compress(v6, ':'));

            // Combine and wrap
            const finalBody = patterns.length > 1 ? patterns.join('|') : patterns[0];
            const result = `/\\b(?:${finalBody})\\b/`;

            document.getElementById('output').innerText = result;
        }

        function compress(list, sep) {
            const trie = {};
            for (const ip of list) {
                let curr = trie;
                ip.split(sep).forEach(part => {
                    if (!curr[part]) curr[part] = {};
                    curr = curr[part];
                });
                curr.$ = true;
            }

            function walk(node) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) return "";

                const results = keys.map(k => {
                    const sub = walk(node[k]);
                    const escapedK = sep === '.' ? k.replace(/\./g, '\\.') : k;
                    const delimiter = sep === '.' ? '\\.' : ':';
                    
                    if (sub === "") return escapedK;
                    return escapedK + delimiter + sub;
                });

                if (results.length === 1) return results[0];
                // Non-capturing groups for SecOps performance
                return "(?:" + results.join('|') + ")";
            }

            const rootKeys = Object.keys(trie).filter(k => k !== '$');
            const branches = rootKeys.map(k => {
                const sub = walk(trie[k]);
                const escapedK = sep === '.' ? k.replace(/\./g, '\\.') : k;
                const delimiter = sep === '.' ? '\\.' : ':';
                return sub === "" ? escapedK : escapedK + delimiter + sub;
            });

            return branches.length === 1 ? branches[0] : branches.join('|');
        }

        async function copyResult() {
            const text = document.getElementById('output').innerText;
            await navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Result", 2000);
        }
    </script>
</body>
</html>
