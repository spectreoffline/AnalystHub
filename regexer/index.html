<!DOCTYPE html>
<html>
<head>
    <title>SecOps UDM Query Generator</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 1000px; margin: 2rem auto; background: #f8f9fa; padding: 20px; color: #202124; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        h2 { margin-top: 0; color: #1a73e8; font-weight: 500; }
        textarea { width: 100%; height: 200px; font-family: 'Fira Code', 'Courier New', monospace; padding: 15px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 13px; resize: vertical; }
        .controls { display: flex; align-items: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #dadce0; font-size: 14px; background: white; cursor: pointer; }
        button { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-run { background: #1a73e8; color: white; }
        .btn-run:hover { background: #1557b0; }
        .btn-copy { background: #34a853; color: white; }
        .btn-copy:hover { background: #2d8e47; }
        #output { background: #202124; color: #e8eaed; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-family: 'Fira Code', monospace; border: 1px solid #3c4043; word-break: break-all; font-size: 13px; line-height: 1.5; margin-top: 10px; min-height: 100px; }
        .label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; color: #5f6368; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SecOps UDM Query Generator</h2>
        <p>Tokenizes IPs into grouped regex statements for one-off UDM searches.</p>
        
        <label class="label">1. Paste IP List:</label>
        <textarea id="input" placeholder="173.239.218.108&#10;173.239.218.173&#10;2605:6400:8045:447..."></textarea>
        
        <div class="controls">
            <div>
                <label class="label">2. Select UDM Field:</label>
                <select id="fieldSelect">
                    <option value="principal">principal.ip</option>
                    <option value="target">target.ip</option>
                    <option value="src">network.src.ip</option>
                    <option value="dst">network.dst.ip</option>
                </select>
            </div>
            <div style="align-self: flex-end;">
                <button class="btn-run" onclick="generateQuery()">Generate UDM Query</button>
                <button class="btn-copy" id="copyBtn" onclick="copyResult()">Copy Query</button>
            </div>
        </div>

        <label class="label">3. UDM Search Syntax:</label>
        <div id="output">Your query will appear here...</div>
    </div>

    <script>
        function generateQuery() {
            const input = document.getElementById('input').value.trim();
            const fieldKey = document.getElementById('fieldSelect').value;
            const fieldName = (fieldKey === 'src' || fieldKey === 'dst') ? `network.${fieldKey}.ip` : `${fieldKey}.ip`;

            if (!input) return;

            const ips = [...new Set(input.split(/\s+/).filter(s => s.length > 0))];
            const v4 = ips.filter(ip => ip.includes('.'));
            const v6 = ips.filter(ip => ip.includes(':'));

            let statements = [];

            if (v4.length) {
                const patterns = buildDeepTrie(v4, '.');
                patterns.forEach(p => {
                    const escaped = p.replace(/\./g, '\\.');
                    statements.push(`${fieldName} = /\\b${escaped}\\b/`);
                });
            }

            if (v6.length) {
                const patterns = buildDeepTrie(v6, ':');
                patterns.forEach(p => {
                    statements.push(`${fieldName} = /\\b${p}\\b/`);
                });
            }

            document.getElementById('output').innerText = statements.join(' OR\n');
        }

        function buildDeepTrie(ips, sep) {
            const trie = {};
            for (const ip of ips) {
                let curr = trie;
                ip.split(sep).forEach(part => {
                    if (!curr[part]) curr[part] = {};
                    curr = curr[part];
                });
                curr.$ = true;
            }

            const results = [];
            function walk(node, path) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) {
                    results.push(path.join(sep));
                    return;
                }
                if (keys.length === 1) {
                    walk(node[keys[0]], [...path, keys[0]]);
                } else {
                    const branches = keys.map(k => getFullSuffix(node[k], k, sep));
                    results.push(path.join(sep) + sep + "(" + branches.join('|') + ")");
                }
            }

            function getFullSuffix(node, currentPart, sep) {
                const keys = Object.keys(node).filter(k => k !== '$');
                if (keys.length === 0) return currentPart;
                if (keys.length === 1) {
                    return getFullSuffix(node[keys[0]], currentPart + sep + keys[0], sep);
                }
                return currentPart + sep + "(" + keys.map(k => getFullSuffix(node[k], k, sep)).join('|') + ")";
            }

            Object.keys(trie).forEach(k => walk(trie[k], [k]));
            return results;
        }

        async function copyResult() {
            const text = document.getElementById('output').innerText;
            await navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Query", 2000);
        }
    </script>
</body>
</html>
